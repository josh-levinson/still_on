<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f5d78e" stop-opacity="1"/>
      <stop offset="40%" stop-color="#e8a030" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#e87010" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="core" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff8e8"/>
      <stop offset="60%" stop-color="#e8c06a"/>
      <stop offset="100%" stop-color="#d4943a"/>
