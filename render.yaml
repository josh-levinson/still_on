services:
  - type: web
    name: still-on
    runtime: ruby
    buildCommand: bundle install && bundle exec rails assets:precompile && bundle exec rails db:prepare
    startCommand: bundle exec rails server -b 0.0.0.0
    healthCheckPath: /up
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: still-on-db
          property: connectionString
      - key: RAILS_ENV
        value: production
      - key: RAILS_MASTER_KEY
        sync: false
      - key: RAILS_LOG_LEVEL
        value: info

databases:
  - name: still-on-db
    plan: free
    databaseName: still_on
    user: still_on
